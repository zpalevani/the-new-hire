<svg width="560" height="280" viewBox="0 0 560 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">The New Hire thumbnail</title>
  <desc id="desc">A dark blue project thumbnail for The New Hire, showing an AI agent onboarding flow from SOP to skill, rules to code, guardrails to security, and approval to human oversight. This version uses a neutral shield and agent icon.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="560" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#18213A"/>
    </linearGradient>
    <linearGradient id="accent" x1="410" y1="-40" x2="570" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#315AA5"/>
      <stop offset="1" stop-color="#1F3B73"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="560" height="280" fill="url(#bg)"/>
  <circle cx="545" cy="70" r="150" fill="url(#accent)" opacity="0.95"/>
  <circle cx="550" cy="70" r="92" fill="#315AA5" opacity="0.55"/>
  <rect x="24" y="22" width="512" height="236" rx="24" stroke="#3B82F6" stroke-width="2"/>

  <text x="48" y="82" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="44" font-weight="800">The New Hire</text>
  <text x="50" y="124" fill="#BFDBFE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Onboard an AI agent like an ops pro.</text>

